<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Notepad</title>
    <!-- REQUIRED LIBRARIES -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.1.3/axios.min.js"></script>
    <!-- GOOGLE FONTS FOR HANDWRITING -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="notepad-container">
        <div class="notepad-paper">
            <div class="paper-lines"></div>
            
            <!-- WRITE MODE -->
            <div id="write-mode" class="mode-container">
                <input type="text" id="write-title" placeholder="Note Title..." maxlength="30">
                <textarea id="write-content" placeholder="Write your note here..."></textarea>
                <div class="button-group">
                    <button id="btn-give">Hand to Person</button>
                    <button id="btn-close-write" class="btn-cancel">Tear & Close</button>
                </div>
            </div>

            <!-- READ MODE -->
            <div id="read-mode" class="mode-container">
                <h2 id="read-title">Title</h2>
                <div id="read-content">Content goes here...</div>
                <div class="button-group">
                    <button id="btn-close-read" class="btn-cancel">Put Away</button>
                </div>
            </div>
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
